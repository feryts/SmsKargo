<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sorgula">
<link rel="manifest" href="/manifest.json">
<title>Gonderi Sorgula</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container { width: 100%; max-width: 420px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; color: #fff; }
  .logo p { font-size: 12px; color: #555; margin-top: 5px; }
  .card { background: #1a1d27; border-radius: 16px; padding: 24px 20px; border: 1px solid #2a2d3a; }
  label { display: block; font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

  .input-row { display: flex; gap: 8px; }
  input {
    flex: 1;
    background: #0f1117;
    border: 1.5px solid #2a2d3a;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 17px;
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }
  input:focus { border-color: #4f8ef7; }
  input::placeholder { color: #3a3d4a; font-size: 13px; letter-spacing: 0; }

  .paste-btn {
    background: #1e2235;
    border: 1.5px solid #2a2d3a;
    border-radius: 10px;
    padding: 14px 14px;
    color: #4f8ef7;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .paste-btn:active { background: #252840; }

  .sorgu-btn {
    width: 100%;
    background: #4f8ef7;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.2s, transform 0.1s;
  }
  .sorgu-btn:active { transform: scale(0.98); }
  .sorgu-btn:hover { background: #3d7ee8; }
  .sorgu-btn:disabled { background: #2a2d3a; color: #555; cursor: not-allowed; }

  .result { margin-top: 16px; background: #0f1117; border-radius: 12px; padding: 18px; border: 1px solid #2a2d3a; display: none; }
  .result.show { display: block; }

  .result-row { display: flex; flex-direction: column; gap: 4px; padding: 10px 0; border-bottom: 1px solid #1a1d27; }
  .result-row:last-child { border-bottom: none; padding-bottom: 0; }
  .result-row:first-child { padding-top: 0; }
  .result-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

  .result-value-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .result-value { font-size: 17px; font-weight: 600; color: #fff; }
  .result-value.phone { color: #4f8ef7; font-size: 20px; letter-spacing: 1px; }
  .result-value.phone4 { color: #888; font-size: 13px; font-weight: 500; }

  .copy-btn {
    background: #1e2235;
    border: 1px solid #2a2d3a;
    border-radius: 7px;
    padding: 6px 10px;
    color: #4f8ef7;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .copy-btn:active { background: #252840; }
  .copy-btn.copied { color: #4caf50; border-color: #2a3d2a; }

  .loading { display: none; text-align: center; padding: 20px; color: #555; font-size: 14px; }
  .loading.show { display: block; }
  .spinner { width: 22px; height: 22px; border: 2px solid #2a2d3a; border-top-color: #4f8ef7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error { display: none; background: #1f1015; border: 1px solid #3d1a20; border-radius: 10px; padding: 12px 16px; margin-top: 12px; color: #e05555; font-size: 13px; text-align: center; }
  .error.show { display: block; }

  .call-btn { display: block; background: #1a2a1a; border: 1px solid #2a3d2a; border-radius: 10px; padding: 13px; margin-top: 10px; color: #4caf50; font-size: 15px; font-weight: 600; text-align: center; text-decoration: none; }
  .call-btn:active { background: #1f331f; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>GONDERI SORGULA</h1>
    <p>Kolay Gelsin Musteri Bilgisi</p>
  </div>

  <div class="card">
    <label>Gonderi No veya Barkod</label>
    <div class="input-row">
      <input type="text" id="gonderiNo" placeholder="Numara veya barkod girin" inputmode="numeric" autocomplete="off" autocorrect="off" autocapitalize="off">
      <button class="paste-btn" onclick="yapistir()" title="Yapistir">Yapıştır</button>
    </div>
    <button class="sorgu-btn" id="sorgulaBtn" onclick="sorgula()">Sorgula</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Sorgulanıyor...
  </div>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="result-row">
      <span class="result-label">Gonderi No</span>
      <div class="result-value-row">
        <span class="result-value" id="resGonderiNo"></span>
      </div>
    </div>
    <div class="result-row">
      <span class="result-label">Ad Soyad</span>
      <div class="result-value-row">
        <span class="result-value" id="resAdSoyad"></span>
      </div>
    </div>
    <div class="result-row">
      <span class="result-label">Telefon</span>
      <div class="result-value-row">
        <div>
          <span class="result-value phone" id="resTelefon"></span>
          <span class="result-value phone4" id="resTelefon4"></span>
        </div>
        <button class="copy-btn" id="copyTelBtn" onclick="kopyalaTel()">Kopyala</button>
      </div>
    </div>
    <a class="call-btn" id="callBtn" href="#">Ara</a>
  </div>
</div>

<script>
  // Enter ile sorgula
  document.getElementById("gonderiNo").addEventListener("keydown", function(e) {
    if (e.key === "Enter") sorgula();
  });

  // Otomatik yapıştır
  async function yapistir() {
    try {
      const text = await navigator.clipboard.readText();
      const temiz = text.trim().replace(/[^a-zA-Z0-9]/g, "");
      if (temiz) {
        document.getElementById("gonderiNo").value = temiz;
        sorgula();
      }
    } catch (e) {
      // Manuel yapıştırma için input'a focus ver
      document.getElementById("gonderiNo").focus();
    }
  }

  // Telefon kopyala
  function kopyalaTel() {
    const tel = document.getElementById("resTelefon").textContent;
    if (!tel) return;
    navigator.clipboard.writeText(tel).then(() => {
      const btn = document.getElementById("copyTelBtn");
      btn.textContent = "Kopyalandi!";
      btn.classList.add("copied");
      setTimeout(() => {
        btn.textContent = "Kopyala";
        btn.classList.remove("copied");
      }, 2000);
    });
  }

  // Sorgula
  async function sorgula() {
    const gonderiNo = document.getElementById("gonderiNo").value.trim().replace(/[^a-zA-Z0-9]/g, "").toUpperCase();
    if (!gonderiNo || gonderiNo.length < 6) { gosterHata("Gecerli bir numara girin."); return; }

    document.getElementById("result").classList.remove("show");
    document.getElementById("error").classList.remove("show");
    document.getElementById("loading").classList.add("show");
    document.getElementById("sorgulaBtn").disabled = true;

    try {
      const res = await fetch("/sorgula", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ gonderiNo })
      });
      const data = await res.json();
      if (data.hata) { gosterHata(data.hata); return; }

      document.getElementById("resGonderiNo").textContent = gonderiNo;
      document.getElementById("resAdSoyad").textContent = data.adSoyad || "Bulunamadi";

      const tel = data.telefon || "";
      document.getElementById("resTelefon").textContent = tel;

      // Son 4 hane
      if (tel.length >= 4) {
        document.getElementById("resTelefon4").textContent = "Son 4: " + tel.slice(-4);
      } else {
        document.getElementById("resTelefon4").textContent = "";
      }

      const callBtn = document.getElementById("callBtn");
      if (tel) {
        callBtn.href = "tel:" + tel;
        callBtn.style.display = "block";
      } else {
        callBtn.style.display = "none";
      }

      document.getElementById("result").classList.add("show");
    } catch (e) {
      gosterHata("Sunucu hatasi, tekrar deneyin.");
    } finally {
      document.getElementById("loading").classList.remove("show");
      document.getElementById("sorgulaBtn").disabled = false;
    }
  }

  function gosterHata(mesaj) {
    document.getElementById("loading").classList.remove("show");
    document.getElementById("sorgulaBtn").disabled = false;
    const err = document.getElementById("error");
    err.textContent = mesaj;
    err.classList.add("show");
  }

  // PWA Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
