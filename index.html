<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sorgula">
<link rel="manifest" href="/manifest.json">
<title>Gonderi Sorgula</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  [data-theme="dark"] {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --text: #ffffff; --text2: #888;
    --accent: #4f8ef7; --accent2: #3d7ee8; --btn-bg: #1e2235; --success: #4caf50;
    --error-bg: #1f1015; --error-border: #3d1a20; --error-text: #e05555;
    --call-bg: #1a2a1a; --call-border: #2a3d2a;
  }
  [data-theme="light"] {
    --bg: #f0f2f8; --card: #ffffff; --border: #dde1f0; --text: #1a1d27; --text2: #888;
    --accent: #2d6ef0; --accent2: #1a5ee0; --btn-bg: #e8ecf8; --success: #2e7d32;
    --error-bg: #fff0f0; --error-border: #ffcdd2; --error-text: #c62828;
    --call-bg: #e8f5e9; --call-border: #a5d6a7;
  }
  [data-theme="colorful"] {
    --bg: #1a0533; --card: rgba(255,255,255,0.08); --border: rgba(255,255,255,0.15);
    --text: #ffffff; --text2: #aaaacc; --accent: #ff6b9d; --accent2: #e05585;
    --btn-bg: rgba(255,107,157,0.15); --success: #00e676;
    --error-bg: rgba(255,0,0,0.1); --error-border: rgba(255,0,0,0.3); --error-text: #ff6b6b;
    --call-bg: rgba(0,230,118,0.1); --call-border: rgba(0,230,118,0.3);
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    transition: background 0.3s, color 0.3s;
  }

  .container { width: 100%; max-width: 420px; }

  .theme-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
  .theme-btn { width: 32px; height: 32px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; transition: transform 0.2s; }
  .theme-btn:active { transform: scale(0.9); }
  .theme-btn.active { border-color: #fff; transform: scale(1.15); }
  .theme-btn.dark { background: #1a1d27; border-color: #4f8ef7; }
  .theme-btn.light { background: linear-gradient(135deg, #f0f2f8, #dde1f0); border-color: #2d6ef0; }
  .theme-btn.colorful { background: linear-gradient(135deg, #ff6b9d, #6c63ff, #00e676); }

  .logo { text-align: center; margin-bottom: 24px; }
  .logo h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; color: var(--text); }
  .logo p { font-size: 12px; color: var(--text2); margin-top: 5px; }

  .card { background: var(--card); border-radius: 16px; padding: 24px 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

  .input-row { display: flex; gap: 8px; }
  input {
    flex: 1; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 14px 16px; font-size: 17px; color: var(--text);
    outline: none; transition: border-color 0.2s; letter-spacing: 1px;
  }
  [data-theme="colorful"] input { background: rgba(0,0,0,0.3); }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text2); font-size: 13px; letter-spacing: 0; opacity: 0.5; }

  .paste-btn {
    background: var(--btn-bg); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 14px; color: var(--accent); font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }
  .paste-btn:active { opacity: 0.8; }

  .sorgu-btn {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 10px; padding: 15px; font-size: 16px; font-weight: 600;
    cursor: pointer; margin-top: 12px; transition: background 0.2s, transform 0.1s;
  }
  .sorgu-btn:active { transform: scale(0.98); }
  .sorgu-btn:disabled { background: var(--border); color: var(--text2); cursor: not-allowed; }

  .result { margin-top: 16px; background: var(--card); border-radius: 12px; padding: 18px; border: 1px solid var(--border); display: none; backdrop-filter: blur(10px); }
  .result.show { display: block; }
  .result-row { display: flex; flex-direction: column; gap: 4px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .result-row:last-child { border-bottom: none; padding-bottom: 0; }
  .result-row:first-child { padding-top: 0; }
  .result-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .result-value-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .result-value { font-size: 17px; font-weight: 600; color: var(--text); }
  .result-value.phone { color: var(--accent); font-size: 20px; letter-spacing: 1px; }
  .result-value.phone4 { color: var(--text2); font-size: 12px; font-weight: 500; }

  .copy-btn {
    background: var(--btn-bg); border: 1px solid var(--border); border-radius: 7px;
    padding: 6px 10px; color: var(--accent); font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  .copy-btn.copied { color: var(--success); }

  .loading { display: none; text-align: center; padding: 20px; color: var(--text2); font-size: 14px; }
  .loading.show { display: block; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error { display: none; background: var(--error-bg); border: 1px solid var(--error-border); border-radius: 10px; padding: 12px 16px; margin-top: 12px; color: var(--error-text); font-size: 13px; text-align: center; }
  .error.show { display: block; }

  .call-btn { display: block; background: var(--call-bg); border: 1px solid var(--call-border); border-radius: 10px; padding: 13px; margin-top: 10px; color: var(--success); font-size: 15px; font-weight: 600; text-align: center; text-decoration: none; }
  .call-btn:active { opacity: 0.8; }
</style>
</head>
<body>
<div class="container">

  <div class="theme-bar">
    <button class="theme-btn dark" onclick="temaAyarla('dark')" title="Koyu"></button>
    <button class="theme-btn light" onclick="temaAyarla('light')" title="Acik"></button>
    <button class="theme-btn colorful" onclick="temaAyarla('colorful')" title="Renkli"></button>
  </div>

  <div class="logo">
    <h1>GONDERI SORGULA</h1>
    <p>Kolay Gelsin Musteri Bilgisi</p>
  </div>

  <div class="card">
    <label>Gonderi No veya Barkod</label>
    <div class="input-row">
      <input type="text" id="gonderiNo" placeholder="Numara veya barkod girin" inputmode="numeric" autocomplete="off" autocorrect="off" autocapitalize="off">
      <button class="paste-btn" onclick="yapistir()">Yapıştır</button>
    </div>
    <button class="sorgu-btn" id="sorgulaBtn" onclick="sorgula()">Sorgula</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Sorgulanıyor...
  </div>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="result-row">
      <span class="result-label">Gonderi No</span>
      <div class="result-value-row">
        <span class="result-value" id="resGonderiNo"></span>
      </div>
    </div>
    <div class="result-row">
      <span class="result-label">Ad Soyad</span>
      <div class="result-value-row">
        <span class="result-value" id="resAdSoyad"></span>
      </div>
    </div>
    <div class="result-row">
      <span class="result-label">Telefon</span>
      <div class="result-value-row">
        <div>
          <span class="result-value phone" id="resTelefon"></span>
          <span class="result-value phone4" id="resTelefon4"></span>
        </div>
        <button class="copy-btn" id="copyTelBtn" onclick="kopyalaTel()">Kopyala</button>
      </div>
    </div>
    <a class="call-btn" id="callBtn" href="#">Ara</a>
  </div>
</div>

<script>
  const kaydedilmis = localStorage.getItem("tema") || "dark";
  temaAyarla(kaydedilmis);

  function temaAyarla(tema) {
    document.documentElement.setAttribute("data-theme", tema);
    localStorage.setItem("tema", tema);
    document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
    document.querySelector(".theme-btn." + tema).classList.add("active");
  }

  document.getElementById("gonderiNo").addEventListener("keydown", function(e) {
    if (e.key === "Enter") sorgula();
  });

  async function yapistir() {
    try {
      const text = await navigator.clipboard.readText();
      const temiz = text.trim().replace(/[^a-zA-Z0-9]/g, "");
      if (temiz) { document.getElementById("gonderiNo").value = temiz; sorgula(); }
    } catch (e) { document.getElementById("gonderiNo").focus(); }
  }

  function kopyalaTel() {
    const tel = document.getElementById("resTelefon").textContent;
    if (!tel) return;
    navigator.clipboard.writeText(tel).then(() => {
      const btn = document.getElementById("copyTelBtn");
      btn.textContent = "Kopyalandi!";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "Kopyala"; btn.classList.remove("copied"); }, 2000);
    });
  }

  async function sorgula() {
    const gonderiNo = document.getElementById("gonderiNo").value.trim().replace(/[^a-zA-Z0-9]/g, "").toUpperCase();
    if (!gonderiNo || gonderiNo.length < 6) { gosterHata("Gecerli bir numara girin."); return; }
    document.getElementById("result").classList.remove("show");
    document.getElementById("error").classList.remove("show");
    document.getElementById("loading").classList.add("show");
    document.getElementById("sorgulaBtn").disabled = true;
    try {
      const res = await fetch("/sorgula", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ gonderiNo })
      });
      const data = await res.json();
      if (data.hata) { gosterHata(data.hata); return; }
      document.getElementById("resGonderiNo").textContent = gonderiNo;
      document.getElementById("resAdSoyad").textContent = data.adSoyad || "Bulunamadi";
      const tel = data.telefon || "";
      document.getElementById("resTelefon").textContent = tel;
      document.getElementById("resTelefon4").textContent = tel.length >= 4 ? "Son 4: " + tel.slice(-4) : "";
      const callBtn = document.getElementById("callBtn");
      if (tel) { callBtn.href = "tel:" + tel; callBtn.style.display = "block"; }
      else { callBtn.style.display = "none"; }
      document.getElementById("result").classList.add("show");
    } catch (e) {
      gosterHata("Sunucu hatasi, tekrar deneyin.");
    } finally {
      document.getElementById("loading").classList.remove("show");
      document.getElementById("sorgulaBtn").disabled = false;
    }
  }

  function gosterHata(mesaj) {
    document.getElementById("loading").classList.remove("show");
    document.getElementById("sorgulaBtn").disabled = false;
    const err = document.getElementById("error");
    err.textContent = mesaj;
    err.classList.add("show");
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
