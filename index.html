<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sorgula">
<link rel="manifest" href="/manifest.json">
<title>Gonderi Sorgula</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  [data-theme="dark"] {
    --bg: #0a0c14; --card: #13161f; --border: #1e2130; --text: #f0f0f0; --text2: #666;
    --accent: #4f8ef7; --accent2: #3d7ee8; --btn-bg: #1a1d2e; --success: #4caf50;
    --error-bg: #1a0f0f; --error-border: #3d1a20; --error-text: #e05555;
    --call-bg: #0f1a0f; --call-border: #1e3d1e; --shadow: rgba(0,0,0,0.4);
  }
  [data-theme="light"] {
    --bg: #eef1f8; --card: #ffffff; --border: #e0e4f0; --text: #1a1d2e; --text2: #999;
    --accent: #2d6ef0; --accent2: #1a5ee0; --btn-bg: #e8ecf8; --success: #2e7d32;
    --error-bg: #fff0f0; --error-border: #ffcdd2; --error-text: #c62828;
    --call-bg: #e8f5e9; --call-border: #a5d6a7; --shadow: rgba(0,0,0,0.1);
  }
  [data-theme="colorful"] {
    --bg: #0d0720; --card: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.12);
    --text: #ffffff; --text2: #9090bb; --accent: #a78bfa; --accent2: #8b5cf6;
    --btn-bg: rgba(167,139,250,0.15); --success: #34d399;
    --error-bg: rgba(255,0,0,0.08); --error-border: rgba(255,80,80,0.3); --error-text: #ff7070;
    --call-bg: rgba(52,211,153,0.08); --call-border: rgba(52,211,153,0.3); --shadow: rgba(0,0,0,0.5);
  }

  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    transition: background 0.3s, color 0.3s;
  }
  [data-theme="colorful"] body {
    background: radial-gradient(ellipse at top, #1a0533 0%, #0d0720 60%);
  }

  .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }

  .header-badge {
    text-align: center;
    font-size: 10px;
    color: var(--text2);
    opacity: 0.6;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 0;
    font-weight: 600;
  }

  .logo { text-align: center; padding: 4px 0; }
  .logo h1 { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: var(--text); opacity: 0.9; }
  .logo p { font-size: 11px; color: var(--text2); margin-top: 4px; letter-spacing: 0.5px; }

  .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 4px 24px var(--shadow); }

  label { display: block; font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }

  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  input {
    flex: 1; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 13px 16px; font-size: 16px; color: var(--text);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  [data-theme="colorful"] input { background: rgba(0,0,0,0.3); }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.1); }
  input::placeholder { color: var(--text2); font-size: 13px; opacity: 0.6; }

  .paste-btn {
    background: var(--btn-bg); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 13px 14px; color: var(--accent); font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .paste-btn:active { transform: scale(0.95); opacity: 0.8; }

  .sorgu-btn {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(79,142,247,0.3);
  }
  .sorgu-btn:active { transform: scale(0.98); }
  .sorgu-btn:disabled { background: var(--border); color: var(--text2); cursor: not-allowed; box-shadow: none; }

  .result { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 4px 24px var(--shadow); display: none; }
  .result.show { display: block; }

  .result-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .result-row:last-child { border-bottom: none; padding-bottom: 0; }
  .result-row:first-child { padding-top: 0; }
  .result-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 5px; }
  .result-value { font-size: 17px; font-weight: 600; color: var(--text); }
  .result-value.name { font-size: 19px; font-weight: 700; }

  .phone-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .phone-info { display: flex; flex-direction: column; gap: 2px; }
  .phone-number { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .phone-last4 { font-size: 11px; color: var(--text2); font-weight: 500; }
  .phone-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .action-btn {
    width: 42px; height: 42px; border-radius: 12px; border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; background: var(--btn-bg);
    text-decoration: none;
  }
  .action-btn:active { transform: scale(0.88); }
  .action-btn.copy { color: var(--accent); font-size: 16px; font-weight: 700; }
  .action-btn.copy.copied { color: var(--success); border-color: var(--success); }
  .action-btn.call { color: var(--success); border-color: var(--call-border); background: var(--call-bg); }

  .loading { display: none; text-align: center; padding: 24px; color: var(--text2); font-size: 13px; }
  .loading.show { display: block; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error { display: none; background: var(--error-bg); border: 1px solid var(--error-border); border-radius: 12px; padding: 12px 16px; color: var(--error-text); font-size: 13px; text-align: center; }
  .error.show { display: block; }

  .theme-bar { display: flex; justify-content: center; gap: 12px; padding: 8px 0; }
  .theme-dot { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
  .theme-dot:active { transform: scale(0.85); }
  .theme-dot.active { transform: scale(1.25); border-color: var(--text); }
  .theme-dot.dark { background: radial-gradient(circle, #1e2235, #0a0c14); border-color: #4f8ef7; }
  .theme-dot.light { background: radial-gradient(circle, #ffffff, #dde1f0); border-color: #2d6ef0; }
  .theme-dot.colorful { background: linear-gradient(135deg, #a78bfa, #ec4899, #34d399); }
</style>
</head>
<body>
<div class="container">

  <div class="header-badge">YAZILIM ADANA DEPOYA AİTTİR</div>

  <div class="logo">
    <h1>GONDERI SORGULA</h1>
    <p>Kolay Gelsin · Musteri Bilgisi</p>
  </div>

  <div class="card">
    <label>Gonderi No</label>
    <div class="input-row">
      <input type="text" id="gonderiNo" placeholder="Gonderi numarasi girin" inputmode="numeric" autocomplete="off" autocorrect="off" autocapitalize="off">
      <button class="paste-btn" onclick="yapistir()">Yapıştır</button>
    </div>
    <button class="sorgu-btn" id="sorgulaBtn" onclick="sorgula()">Sorgula</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Sorgulanıyor...
  </div>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="result-row">
      <div class="result-label">Gonderi No</div>
      <div class="result-value" id="resGonderiNo"></div>
    </div>
    <div class="result-row">
      <div class="result-label">Ad Soyad</div>
      <div class="result-value name" id="resAdSoyad"></div>
    </div>
    <div class="result-row">
      <div class="result-label">Telefon</div>
      <div class="phone-row">
        <div class="phone-info">
          <span class="phone-number" id="resTelefon"></span>
          <span class="phone-last4" id="resTelefon4"></span>
        </div>
        <div class="phone-actions">
          <button class="action-btn copy" id="copyBtn" onclick="kopyalaSon4()" title="Son 4 haneyi kopyala">⊕</button>
          <a class="action-btn call" id="callBtn" href="#" title="Ara">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="theme-bar">
    <button class="theme-dot dark" onclick="temaAyarla('dark')" title="Koyu"></button>
    <button class="theme-dot light" onclick="temaAyarla('light')" title="Acik"></button>
    <button class="theme-dot colorful" onclick="temaAyarla('colorful')" title="Renkli"></button>
  </div>

</div>
<script>
  const kaydedilmis = localStorage.getItem("tema") || "dark";
  temaAyarla(kaydedilmis);

  function temaAyarla(tema) {
    document.documentElement.setAttribute("data-theme", tema);
    localStorage.setItem("tema", tema);
    document.querySelectorAll(".theme-dot").forEach(b => b.classList.remove("active"));
    document.querySelector(".theme-dot." + tema).classList.add("active");
  }

  document.getElementById("gonderiNo").addEventListener("keydown", function(e) {
    if (e.key === "Enter") sorgula();
  });

  async function yapistir() {
    try {
      const text = await navigator.clipboard.readText();
      const temiz = text.trim().replace(/[^a-zA-Z0-9]/g, "");
      if (temiz) { document.getElementById("gonderiNo").value = temiz; sorgula(); }
    } catch (e) { document.getElementById("gonderiNo").focus(); }
  }

  function kopyalaSon4() {
    const tel = document.getElementById("resTelefon").textContent;
    if (!tel) return;
    const son4 = tel.slice(-4);
    navigator.clipboard.writeText(son4).then(() => {
      const btn = document.getElementById("copyBtn");
      btn.innerHTML = "✓";
      btn.classList.add("copied");
      setTimeout(() => { btn.innerHTML = "⊕"; btn.classList.remove("copied"); }, 2000);
    });
  }

  async function sorgula() {
    const gonderiNo = document.getElementById("gonderiNo").value.trim().replace(/[^a-zA-Z0-9]/g, "").toUpperCase();
    if (!gonderiNo || gonderiNo.length < 6) { gosterHata("Gecerli bir numara girin."); return; }
    document.getElementById("result").classList.remove("show");
    document.getElementById("error").classList.remove("show");
    document.getElementById("loading").classList.add("show");
    document.getElementById("sorgulaBtn").disabled = true;
    try {
      const res = await fetch("/sorgula", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ gonderiNo })
      });
      const data = await res.json();
      if (data.hata) { gosterHata(data.hata); return; }
      document.getElementById("resGonderiNo").textContent = gonderiNo;
      document.getElementById("resAdSoyad").textContent = data.adSoyad || "Bulunamadi";
      const tel = data.telefon || "";
      document.getElementById("resTelefon").textContent = tel;
      document.getElementById("resTelefon4").textContent = tel.length >= 4 ? "Son 4: " + tel.slice(-4) : "";
      const callBtn = document.getElementById("callBtn");
      if (tel) { callBtn.href = "tel:" + tel; callBtn.style.display = "flex"; }
      else { callBtn.style.display = "none"; }
      document.getElementById("result").classList.add("show");
    } catch (e) {
      gosterHata("Sunucu hatasi, tekrar deneyin.");
    } finally {
      document.getElementById("loading").classList.remove("show");
      document.getElementById("sorgulaBtn").disabled = false;
    }
  }

  function gosterHata(mesaj) {
    document.getElementById("loading").classList.remove("show");
    document.getElementById("sorgulaBtn").disabled = false;
    const err = document.getElementById("error");
    err.textContent = mesaj;
    err.classList.add("show");
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
