<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0f0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sorgula">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Kolay Gelsin Gonderi Sorgula</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  [data-theme="dark"] {
    --bg: #080e08; --card: #0f170f; --border: #1a2a1a; --text: #e8f0e8; --text2: #4a6a4a;
    --accent: #4db84d; --accent2: #3da83d; --btn-bg: #0f1f0f; --success: #4caf50;
    --error-bg: #1a0808; --error-border: #3d1515; --error-text: #e05555;
    --shadow: rgba(0,0,0,0.6); --logo-opacity: 0.04; --adres: #a0b8a0;
  }
  [data-theme="light"] {
    --bg: #f2f8f2; --card: #ffffff; --border: #cce8cc; --text: #0f1f0f; --text2: #7a9a7a;
    --accent: #3da83d; --accent2: #2d982d; --btn-bg: #e0f0e0; --success: #2e7d32;
    --error-bg: #fff0f0; --error-border: #ffcdd2; --error-text: #c62828;
    --shadow: rgba(0,50,0,0.08); --logo-opacity: 0.07; --adres: #3a5a3a;
  }
  [data-theme="colorful"] {
    --bg: #05100a; --card: rgba(255,255,255,0.05); --border: rgba(77,184,77,0.2);
    --text: #e0ffe0; --text2: #4a7a5a; --accent: #4db84d; --accent2: #3da83d;
    --btn-bg: rgba(77,184,77,0.1); --success: #00e676;
    --error-bg: rgba(255,0,0,0.06); --error-border: rgba(255,80,80,0.25); --error-text: #ff7070;
    --shadow: rgba(0,0,0,0.7); --logo-opacity: 0.05; --adres: #7aff9a;
  }
  [data-theme="night"] {
    --bg: #0a0a1a; --card: #10102a; --border: #1a1a3a; --text: #d0d0ff; --text2: #4a4a8a;
    --accent: #7070ff; --accent2: #5050ee; --btn-bg: #10102a; --success: #4caf50;
    --error-bg: #1a0808; --error-border: #3d1515; --error-text: #e05555;
    --shadow: rgba(0,0,0,0.7); --logo-opacity: 0.04; --adres: #9090cc;
  }
  [data-theme="sunset"] {
    --bg: #1a0a05; --card: #2a1208; --border: #3a1a0a; --text: #ffe8d0; --text2: #8a5a3a;
    --accent: #ff8c42; --accent2: #e07030; --btn-bg: #2a1208; --success: #4caf50;
    --error-bg: #1a0808; --error-border: #3d1515; --error-text: #e05555;
    --shadow: rgba(0,0,0,0.6); --logo-opacity: 0.04; --adres: #ffb880;
  }
  [data-theme="ocean"] {
    --bg: #05080f; --card: #080f1f; --border: #0f1f3a; --text: #d0e8ff; --text2: #3a6a9a;
    --accent: #4a9aff; --accent2: #3a8aee; --btn-bg: #080f1f; --success: #00e676;
    --error-bg: #1a0808; --error-border: #3d1515; --error-text: #e05555;
    --shadow: rgba(0,0,0,0.7); --logo-opacity: 0.04; --adres: #80c0ff;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 0 20px 24px; transition: background 0.3s, color 0.3s;
    position: relative; overflow-x: hidden;
  }
  [data-theme="colorful"] body { background: radial-gradient(ellipse at 30% 20%, #0a2010 0%, #05100a 60%); }
  [data-theme="night"] body { background: radial-gradient(ellipse at 50% 0%, #15153a 0%, #0a0a1a 60%); }
  [data-theme="sunset"] body { background: radial-gradient(ellipse at 50% 0%, #3a1505 0%, #1a0a05 60%); }
  [data-theme="ocean"] body { background: radial-gradient(ellipse at 50% 0%, #05101f 0%, #05080f 60%); }

  .bg-logo {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90vw; max-width: 500px;
    opacity: var(--logo-opacity);
    pointer-events: none; z-index: 0;
  }

  .container {
    width: 100%; max-width: 400px;
    display: flex; flex-direction: column; gap: 10px;
    position: relative; z-index: 1;
    padding-top: 14vh;
    transition: padding-top 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .container.compact { padding-top: 5vh; }

  .header { text-align: center; transition: all 0.5s cubic-bezier(0.4,0,0.2,1); margin-bottom: 8px; }
  .header .custom-logo { max-width: 160px; height: auto; transition: all 0.5s cubic-bezier(0.4,0,0.2,1); display: block; margin: 0 auto 10px; }
  .header .kg-label { font-size: 26px; font-weight: 800; letter-spacing: 6px; color: var(--accent); text-transform: uppercase; display: block; transition: all 0.5s cubic-bezier(0.4,0,0.2,1); line-height: 1.1; }
  .header h1 { font-size: 13px; font-weight: 400; letter-spacing: 3px; color: var(--text2); text-transform: uppercase; transition: all 0.5s cubic-bezier(0.4,0,0.2,1); margin-top: 6px; }
  .header.compact .custom-logo { max-width: 60px; margin-bottom: 5px; }
  .header.compact .kg-label { font-size: 14px; letter-spacing: 4px; }
  .header.compact h1 { font-size: 9px; letter-spacing: 2px; margin-top: 2px; }

  .card { background: var(--card); border-radius: 18px; padding: 18px; border: 1px solid var(--border); box-shadow: 0 8px 32px var(--shadow); }
  label { display: block; font-size: 10px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-family: 'DM Mono', monospace; }

  .input-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: stretch; }
  input {
    flex: 1; min-width: 0; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 13px 14px; font-size: 16px;
    font-family: 'DM Mono', monospace; color: var(--text);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(77,184,77,0.12); }
  input::placeholder { color: var(--text2); font-size: 12px; opacity: 0.7; font-family: 'Outfit', sans-serif; }

  .paste-btn {
    flex-shrink: 0; background: var(--btn-bg); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 0 14px; color: var(--accent); font-size: 12px; font-weight: 700;
    font-family: 'Outfit', sans-serif; cursor: pointer; white-space: nowrap;
    transition: all 0.2s; display: flex; align-items: center; gap: 5px;
  }
  .paste-btn:active { transform: scale(0.95); }

  .btn-row { display: flex; gap: 8px; }
  .sorgu-btn {
    flex: 1; background: var(--accent); color: #fff; border: none;
    border-radius: 12px; padding: 15px; font-size: 15px; font-weight: 700;
    font-family: 'Outfit', sans-serif; letter-spacing: 1.5px;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(77,184,77,0.35);
  }
  .sorgu-btn:active { transform: scale(0.98); background: var(--accent2); }
  .sorgu-btn:disabled { background: var(--border); color: var(--text2); cursor: not-allowed; box-shadow: none; }

  .gecmis-btn {
    background: var(--btn-bg); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 15px 16px; color: var(--accent); font-size: 13px; font-weight: 700;
    font-family: 'Outfit', sans-serif; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .gecmis-btn:active { transform: scale(0.95); }

  .gecmis-panel {
    background: var(--card); border-radius: 18px; overflow: hidden;
    border: 1px solid var(--border); box-shadow: 0 8px 32px var(--shadow); display: none;
  }
  .gecmis-panel.show { display: block; }
  .gecmis-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .gecmis-title { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-family: 'DM Mono', monospace; }
  .gecmis-timer { font-size: 10px; color: var(--text2); font-family: 'DM Mono', monospace; }
  .gecmis-liste { overflow-y: auto; max-height: 300px; }
  .gecmis-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .gecmis-item:last-child { border-bottom: none; }
  .gecmis-item:active { background: rgba(77,184,77,0.08); }
  .gecmis-no { font-size: 13px; font-weight: 600; color: var(--accent); font-family: 'DM Mono', monospace; }
  .gecmis-ad { font-size: 13px; font-weight: 500; color: var(--text); text-align: right; max-width: 55%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gecmis-bos { padding: 24px; text-align: center; font-size: 13px; color: var(--text2); }

  .result { background: var(--card); border-radius: 18px; padding: 18px; border: 1px solid var(--border); box-shadow: 0 8px 32px var(--shadow); display: none; }
  .result.show { display: block; }
  .result-row { padding: 11px 0; border-bottom: 1px solid var(--border); }
  .result-row:last-child { border-bottom: none; padding-bottom: 0; }
  .result-row:first-child { padding-top: 0; }
  .result-label { font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .result-value { font-size: 17px; font-weight: 600; color: var(--text); }
  .result-value.name { font-size: 20px; font-weight: 700; }
  .result-value.adres { font-size: 14px; font-weight: 500; color: var(--adres); line-height: 1.6; }

  .phone-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .phone-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .phone-number { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 1.5px; font-family: 'DM Mono', monospace; }
  .phone-last4 { font-size: 11px; color: var(--text2); font-weight: 500; font-family: 'DM Mono', monospace; }
  .phone-actions { display: flex; gap: 10px; flex-shrink: 0; }

  .action-btn {
    width: 52px; height: 52px; border-radius: 14px; border: 1.5px solid rgba(77,184,77,0.25);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    cursor: pointer; transition: all 0.2s; background: rgba(77,184,77,0.07);
    text-decoration: none; gap: 3px; color: var(--accent);
  }
  .action-btn:active { transform: scale(0.88); }
  .action-btn svg { width: 22px; height: 22px; }
  .action-btn .btn-label { font-size: 8px; font-weight: 700; letter-spacing: 0.5px; font-family: 'Outfit', sans-serif; color: var(--text2); }
  .action-btn.copy.copied { color: var(--success); border-color: var(--success); background: rgba(76,175,80,0.1); }
  .action-btn.copy.copied .btn-label { color: var(--success); }

  .loading { display: none; text-align: center; padding: 20px; color: var(--text2); font-size: 13px; }
  .loading.show { display: block; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error { display: none; background: var(--error-bg); border: 1px solid var(--error-border); border-radius: 12px; padding: 12px 16px; color: var(--error-text); font-size: 13px; text-align: center; }
  .error.show { display: block; }

  .theme-bar { display: flex; justify-content: center; gap: 10px; padding: 10px 0 4px; flex-wrap: wrap; }
  .theme-dot { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; transition: all 0.25s; }
  .theme-dot:active { transform: scale(0.82); }
  .theme-dot.active { transform: scale(1.3); border-color: var(--text) !important; }
  .theme-dot.dark { background: radial-gradient(circle at 35% 35%, #1a2a1a, #080e08); border-color: #4db84d; }
  .theme-dot.light { background: radial-gradient(circle at 35% 35%, #ffffff, #cce8cc); border-color: #3da83d; }
  .theme-dot.colorful { background: linear-gradient(135deg, #4db84d, #00e676, #0a2010); }
  .theme-dot.night { background: linear-gradient(135deg, #7070ff, #1a1a4a, #0a0a1a); }
  .theme-dot.sunset { background: linear-gradient(135deg, #ff8c42, #cc4400, #1a0a05); }
  .theme-dot.ocean { background: linear-gradient(135deg, #4a9aff, #0055cc, #05080f); }
</style>
</head>
<body>

<img class="bg-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Kolay_Gelsin_logo.png/800px-Kolay_Gelsin_logo.png" alt="" onerror="this.style.display='none'">

<div class="container" id="container">
  <div class="header" id="header">
    <img class="custom-logo" src="https://raw.githubusercontent.com/feryts/SmsKargo/main/logo.png" alt="Logo" onerror="this.style.display='none'">
    <span class="kg-label">KOLAY GELSİN</span>
    <h1>GONDERİ SORGULA</h1>
  </div>

  <div class="card">
    <label>Gonderi No</label>
    <div class="input-row">
      <input type="text" id="gonderiNo" placeholder="Numara girin..." inputmode="numeric" autocomplete="off" autocorrect="off" autocapitalize="off">
      <button class="paste-btn" onclick="yapistir()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z"/></svg>
        Yapıştır
      </button>
    </div>
    <div class="btn-row">
      <button class="sorgu-btn" id="sorgulaBtn" onclick="sorgula()">SORGULA</button>
      <button class="gecmis-btn" id="gecmisBtn" onclick="gecmisToggle()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
        GEÇMİŞ
      </button>
    </div>
  </div>

  <div class="gecmis-panel" id="gecmisPanel">
    <div class="gecmis-header">
      <span class="gecmis-title">Sorgu Geçmişi</span>
      <span class="gecmis-timer" id="gecmisTimer"></span>
    </div>
    <div class="gecmis-liste" id="gecmisListe"></div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Sorgulanıyor...
  </div>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="result-row">
      <div class="result-label">Gonderi No</div>
      <div class="result-value" id="resGonderiNo"></div>
    </div>
    <div class="result-row">
      <div class="result-label">Ad Soyad</div>
      <div class="result-value name" id="resAdSoyad"></div>
    </div>
    <div class="result-row">
      <div class="result-label">Adres</div>
      <div class="result-value adres" id="resAdres"></div>
    </div>
    <div class="result-row">
      <div class="result-label">Telefon</div>
      <div class="phone-row">
        <div class="phone-info">
          <span class="phone-number" id="resTelefon"></span>
          <span class="phone-last4" id="resTelefon4"></span>
        </div>
        <div class="phone-actions">
          <button class="action-btn copy" id="copyBtn" onclick="kopyalaSon4()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            <span class="btn-label" id="copyLabel">SON 4</span>
          </button>
          <a class="action-btn call" id="callBtn" href="#" title="Ara">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            <span class="btn-label">ARA</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="theme-bar">
    <button class="theme-dot dark" onclick="temaAyarla('dark')" title="Koyu"></button>
    <button class="theme-dot light" onclick="temaAyarla('light')" title="Acik"></button>
    <button class="theme-dot colorful" onclick="temaAyarla('colorful')" title="Renkli"></button>
    <button class="theme-dot night" onclick="temaAyarla('night')" title="Gece"></button>
    <button class="theme-dot sunset" onclick="temaAyarla('sunset')" title="Gunbatimi"></button>
    <button class="theme-dot ocean" onclick="temaAyarla('ocean')" title="Okyanus"></button>
  </div>
</div>

<script>
  // TEMA
  function temaAyarla(tema) {
    document.documentElement.setAttribute("data-theme", tema);
    localStorage.setItem("tema", tema);
    document.querySelectorAll(".theme-dot").forEach(b => b.classList.remove("active"));
    const dot = document.querySelector(".theme-dot." + tema);
    if (dot) dot.classList.add("active");
  }
  temaAyarla(localStorage.getItem("tema") || "dark");

  // GEÇMİŞ
  const GECMIS_KEY = "sorgu_gecmis";
  const GECMIS_ZAMAN_KEY = "sorgu_gecmis_zaman";
  const GECMIS_SURE = 3 * 60 * 60 * 1000;

  function gecmisAl() {
    const zaman = parseInt(localStorage.getItem(GECMIS_ZAMAN_KEY) || "0");
    if (zaman && Date.now() - zaman > GECMIS_SURE) {
      localStorage.removeItem(GECMIS_KEY);
      localStorage.setItem(GECMIS_ZAMAN_KEY, Date.now().toString());
      return [];
    }
    try { return JSON.parse(localStorage.getItem(GECMIS_KEY) || "[]"); }
    catch(e) { return []; }
  }

  function gecmisEkle(no, ad) {
    let liste = gecmisAl();
    liste = liste.filter(g => g.no !== no);
    liste.unshift({ no, ad });
    if (liste.length > 50) liste = liste.slice(0, 50);
    localStorage.setItem(GECMIS_KEY, JSON.stringify(liste));
    if (!localStorage.getItem(GECMIS_ZAMAN_KEY)) {
      localStorage.setItem(GECMIS_ZAMAN_KEY, Date.now().toString());
    }
  }

  function gecmisGuncelle() {
    const liste = gecmisAl();
    const el = document.getElementById("gecmisListe");
    if (!liste.length) {
      el.innerHTML = '<div class="gecmis-bos">Henüz sorgu yapılmadı</div>';
      return;
    }
    el.innerHTML = liste.map(g =>
      `<div class="gecmis-item" onclick="gecmisSec('${g.no}')">
        <span class="gecmis-no">${g.no}</span>
        <span class="gecmis-ad">${g.ad || ""}</span>
      </div>`
    ).join("");
  }

  function gecmisSec(no) {
    document.getElementById("gonderiNo").value = no;
    document.getElementById("gecmisPanel").classList.remove("show");
    sorgula();
  }

  function gecmisToggle() {
    const panel = document.getElementById("gecmisPanel");
    if (panel.classList.contains("show")) {
      panel.classList.remove("show");
    } else {
      gecmisGuncelle();
      panel.classList.add("show");
    }
  }

  function gecmisSayac() {
    const zaman = parseInt(localStorage.getItem(GECMIS_ZAMAN_KEY) || "0");
    if (!zaman) { document.getElementById("gecmisTimer").textContent = ""; return; }
    const kalan = GECMIS_SURE - (Date.now() - zaman);
    if (kalan <= 0) {
      localStorage.removeItem(GECMIS_KEY);
      localStorage.setItem(GECMIS_ZAMAN_KEY, Date.now().toString());
      document.getElementById("gecmisTimer").textContent = "Sıfırlandı";
      gecmisGuncelle();
      return;
    }
    const s = Math.floor(kalan / 3600000);
    const d = Math.floor((kalan % 3600000) / 60000);
    const sn = Math.floor((kalan % 60000) / 1000);
    document.getElementById("gecmisTimer").textContent =
      `${s}:${String(d).padStart(2,"0")}:${String(sn).padStart(2,"0")}`;
  }
  setInterval(gecmisSayac, 1000);
  gecmisSayac();

  // INPUT
  document.getElementById("gonderiNo").addEventListener("keydown", e => {
    if (e.key === "Enter") sorgula();
  });
